# ==============================================================================
# Backend Dotnet Dev Container - Docker Compose Configuration
# ==============================================================================
# This Docker Compose file orchestrates multiple services required for local development
# - app: Main development container with .NET 8 SDK
# - postgres: PostgreSQL database for application data storage
# - pgadmin: Web-based PostgreSQL administration tool

services:
  # ----------------------------------------------------------------------------
  # Main Development Container
  # ----------------------------------------------------------------------------
  sdk:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dotnet-sdk
    command: sleep infinity
    depends_on:
      - postgres

  # ----------------------------------------------------------------------------
  # PostgreSQL Database
  # ----------------------------------------------------------------------------
  postgres:
    image: postgres
    restart: always
    container_name: postgres
    ports:
      - 5432:5432
    environment:
      - POSTGRES_DB=dbtest
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password

  # ----------------------------------------------------------------------------
  # PostgreSQL Administration Tool
  # ----------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    ports:
      - 8888:80
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=password
    depends_on:
      - postgres