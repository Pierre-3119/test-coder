# ==============================================================================
# Backend Dotnet Dev Container - Docker Compose Configuration
# ==============================================================================
# This Docker Compose file orchestrates multiple services required for local development
# - app: Main development container with .NET 8 SDK
# - postgres: PostgreSQL database for application data storage
# - pgadmin: Web-based PostgreSQL administration tool
# - ldap: LDAP server for authentication
# - phpldapadmin: Web-based LDAP administration tool

services:
  # ----------------------------------------------------------------------------
  # Main Development Container
  # ----------------------------------------------------------------------------
  sdk:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dotnet-container
    command: /bin/sh -c "while sleep 1000; do :; done"
    depends_on:
      - postgres

  # ----------------------------------------------------------------------------
  # PostgreSQL Database
  # ----------------------------------------------------------------------------
  postgres:
    image: postgres
    restart: always
    container_name: postgres
    ports:
      - 5432:5432
    environment:
      - POSTGRES_DB=dbtest
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=LocalPass!

  # ----------------------------------------------------------------------------
  # PostgreSQL Administration Tool
  # ----------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    ports:
      - 8888:80
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=LocalPass!
    depends_on:
      - postgres

  # ----------------------------------------------------------------------------
  # LDAP Server for Authentication
  # ----------------------------------------------------------------------------
  ldap:
    cap_add:
      - SYS_ADMIN
      - DAC_READ_SEARCH
    image: mnorsic/samba-ad
    container_name: ldap
    environment:
      - REALM=MYCORP.CORP
      - DOMAIN=MYCORP
      - DOMAIN_DN=DC=mycorp,DC=corp
      - ADMINPASS=LocalPass!
    volumes:
      - ./conf/ldap:/ldif:ro
    ports:
      - "389:389"
    restart: unless-stopped

  # ----------------------------------------------------------------------------
  # LDAP Administration Tool
  # ----------------------------------------------------------------------------
  phpldapadmin:
    image: osixia/phpldapadmin:latest
    container_name: phpldapadmin
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: ldap
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "8081:80"
    restart: unless-stopped
    depends_on:
      - ldap